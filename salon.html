<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-t="salon_title">مركز التجميل — Marshmallow</title>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .salon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
    .salon-card{background:var(--white);border-radius:var(--radius-xl);box-shadow:var(--shadow-sm);overflow:hidden;transition:all var(--transition)}
    .salon-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-hover)}
    .salon-card-img{height:180px;background:var(--warm-white);display:flex;align-items:center;justify-content:center;font-size:3rem;border-bottom:2px solid rgba(184,144,126,0.1)}
    .salon-card-body{padding:20px}
    .salon-card-body h3{font-size:1.05rem;margin-bottom:6px}
    .salon-card-body p{font-size:0.85rem;color:var(--charcoal);opacity:0.7;line-height:1.7;margin-bottom:8px}
    .salon-card-price{font-family:var(--font-english-body);font-weight:700;color:var(--rose-mauve-dark);font-size:1rem;margin-bottom:12px}
    .salon-card-actions{display:flex;gap:8px}
  </style>
</head>
<body>
  <div class="splash-screen" id="splash">
    <div class="splash-logo-m" id="splashLogo"></div>
    <div class="splash-brand">MARSHMALLOW</div>
    <div class="splash-sub">PHOTO CHALET & EVENTS</div>
    <div class="splash-line"></div>
    <div class="splash-dots">
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
    </div>
  </div>
  <header class="site-header"></header>

  <main class="page-container">
    <div class="section-header">
      <h1 data-t="salon_title">مركز التجميل والكوافير</h1>
      <div class="section-line"></div>
      <p data-t="salon_subtitle">خدمات تجميل وعناية متكاملة بأيدي أمهر الخبيرات</p>
    </div>

    <div class="salon-grid" id="salonGrid">
      <div class="loading-overlay" style="grid-column:1/-1;">
        <div class="spinner"></div>
        <div class="loading-text" data-t="cal_loading">جاري تحميل...</div>
      </div>
    </div>

    <!-- Gallery -->
    <div class="gallery-section" style="margin-top:48px;">
      <h2 class="gallery-section-title" data-t="gallery_salon">معرض خدمات التجميل</h2>
      <div id="salonGallery"></div>
    </div>
  </main>

  <a class="whatsapp-float" href="https://wa.me/966XXXXXXXXX" target="_blank" data-t-aria="home_contact_title">
    <svg viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
  </a>

  <footer class="site-footer"></footer>

  <script src="js/translations.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  <script src="js/salonServices.js"></script>
  <script src="js/galleryData.js"></script>
  <script src="js/gallery.js"></script>
  <script>
    initPage("salon");

    function renderSalonServices() {
      const grid = document.getElementById("salonGrid");
      let html = "";
      SALON_SERVICES.forEach(service => {
        const name = Lang.isAr() ? service.name : (service.name_en || service.name);
        const desc = Lang.isAr() ? service.description : (service.description_en || service.description);
        const waText = Lang.isAr() ? `مرحبًا، أريد حجز خدمة: ${service.name}` : `Hello, I want to book: ${service.name_en || service.name}`;
        html += `<div class="salon-card">
          <div class="salon-card-img">${service.icon}</div>
          <div class="salon-card-body">
            <h3>${name}</h3>
            <p>${desc}</p>
            ${service.price ? `<div class="salon-card-price">${service.price}</div>` : ''}
            <div class="salon-card-actions">
              <a href="${getWhatsAppLink(waText)}" target="_blank" class="btn btn-primary btn-sm">
                <span data-t="salon_book_wa">احجزي عبر واتساب</span>
              </a>
            </div>
          </div>
        </div>`;
      });
      grid.innerHTML = html;
    }

    renderSalonServices();
    createGallery({ containerId: "salonGallery", category: "salon", columns: 3 });
  </script>
</body>
</html>
