<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marshmallow — Photo Chalet & Events</title>
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="splash-screen" id="splash">
    <div class="splash-logo-m" id="splashLogo"></div>
    <div class="splash-brand">MARSHMALLOW</div>
    <div class="splash-sub">PHOTO CHALET & EVENTS</div>
    <div class="splash-line"></div>
    <div class="splash-dots">
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
    </div>
  </div>

  <header class="site-header"></header>

  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <img src="images/logo.png" alt="Marshmallow Logo" class="hero-logo" onerror="this.style.display='none'">
      <h1 class="hero-title english-heading" data-t="hero_title">MARSHMALLOW</h1>
      <div class="hero-subtitle-ar" data-t="hero_subtitle"> PHOTO CHALET & EVENTS</div>
      <p class="hero-tagline" data-t="hero_tagline">استوديو تصوير وشاليه فاخر للمناسبات والأفراح.</p>

      <div class="services-grid">
        <a href="chalet.html" class="service-card">
          <div class="service-card-icon">🏡</div>
          <div class="service-card-title" data-t="home_chalet_title">حجز الشاليه</div>
          <div class="service-card-desc" data-t="home_chalet_desc">استمتع بتجربة مميزة</div>
        </a>
        <a href="photography.html" class="service-card">
          <div class="service-card-icon">📸</div>
          <div class="service-card-title" data-t="home_photo_title">حجز جلسة تصوير</div>
          <div class="service-card-desc" data-t="home_photo_desc">احجز موعدك لجلسة تصوير</div>
        </a>
        <a href="salon.html" class="service-card">
          <div class="service-card-icon">💇‍♀️</div>
          <div class="service-card-title" data-t="home_salon_title">مركز التجميل</div>
          <div class="service-card-desc" data-t="home_salon_desc">خدمات تجميل وعناية</div>
        </a>
        <a href="https://wa.me/966XXXXXXXXX" target="_blank" class="service-card">
          <div class="service-card-icon">📞</div>
          <div class="service-card-title" data-t="home_contact_title">تواصل معنا</div>
          <div class="service-card-desc" data-t="home_contact_desc">تواصل عبر واتساب</div>
        </a>
      </div>
    </div>
  </section>

  <!-- Testimonials Section -->
  <section class="testimonials-section">
    <div class="container">
      <div class="section-header">
        <h2 data-t="testimonials_title">آراء عملائنا</h2>
        <div class="section-line"></div>
      </div>
      <div class="testimonials-container" id="homeTestimonials"></div>
    </div>
  </section>

  <footer class="site-footer"></footer>

  <script src="js/translations.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  <script src="js/testimonials.js"></script>
  <script>
    initPage("home");

    (async function loadTestimonials() {
      try {
        const result = await API.getTestimonials();
        if (result.success && result.testimonials && result.testimonials.length > 0) {
          createTestimonialsSlider({
            containerId: "homeTestimonials",
            testimonials: result.testimonials
          });
        } else {
          document.getElementById("homeTestimonials").innerHTML =
            `<p class="testimonials-empty">${t("testimonials_empty")}</p>`;
        }
      } catch (err) {
        document.getElementById("homeTestimonials").innerHTML =
          `<p class="testimonials-empty">${t("testimonials_empty")}</p>`;
      }
    })();
  </script>
</body>
</html>
